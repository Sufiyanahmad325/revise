<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        form {
            border: 2px solid red;
            padding: 10px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        input {
            font-size: 22px;
            padding: 3px 5px;
        }

        form div {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body>
    <div class="container">
        <form action="http://localhost:8000/api/v1/users/uploadBlog" method="post">
            <div>
                <label for="">name</label>
                <input type="text" name="name">
            </div>

            <div>
                <label for="">username</label>
                <input type="text" name="username" id="">
            </div>

            <div>
                <label for="">password</label>
                <input type="text" name="password" id="">
            </div>

            <button type="submit">SignUp</button>
        </form>
    </div>

    <script>

        let SignUpForm= document.querySelector('form')

        SignUpForm.addEventListener("submit" , async(e)=>{
            e.preventDefault()

            let formdata = new FormData(SignUpForm)
            let showformdata = Object.fromEntries(formdata)

            let response = await fetch(SignUpForm.action , {
                method:SignUpForm.method,
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(showformdata),
                
            })

            if(response.ok){
                window.location.href='/FrontEnd/Login.html'
            }

        })


    </script>
</body>

</html>
